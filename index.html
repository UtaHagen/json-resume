<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<title>resume.json</title>
<meta name="viewport" content="width=device-width, initial-scale=1" />
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600;700&display=swap" rel="stylesheet">

<style>
  :root {
    --paper:        #ffffff;
    --paper-dark:   #f5f4fa;
    --paper-shade:  #cbe2e6;
    --ink:          #2a241c;
    --ink-soft:     #6a5f4d;
    --ink-faint:    #688084;
    --accent:       #5e8096;
    --accent-soft:  #e08fa0;
    --pick:         #6b8e3b;
    --pick-bg:      #2d3336;
  }

  * { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; }

  body {
    font-family: "JetBrains Mono", ui-monospace, Menlo, monospace;
    color: var(--ink);
    background:
      radial-gradient(ellipse 80% 60% at 50% 40%, #7acad1 0%, #ddecff 60%, #c3f2f9 100%);
    min-height: 100vh;
    padding: 32px 16px 64px;
    -webkit-font-smoothing: antialiased;
  }

  /* receipt paper — two layers: drop-shadow wrapper + actual paper */
  .receipt-wrap {
    max-width: 1080px;
    margin: 0 auto;
    position: relative;
    filter: drop-shadow(0 2px 8px rgba(0,0,0,0.06));
  }

  .receipt {
    background: var(--paper);
    position: relative;
    padding: 56px 44px 56px 44px;
    /* serrated top + bottom edges */
    --teeth: 12px;
    clip-path: polygon(
      0% 12px,
      2.5% 0,    5% 12px,
      7.5% 0,    10% 12px,
      12.5% 0,   15% 12px,
      17.5% 0,   20% 12px,
      22.5% 0,   25% 12px,
      27.5% 0,   30% 12px,
      32.5% 0,   35% 12px,
      37.5% 0,   40% 12px,
      42.5% 0,   45% 12px,
      47.5% 0,   50% 12px,
      52.5% 0,   55% 12px,
      57.5% 0,   60% 12px,
      62.5% 0,   65% 12px,
      67.5% 0,   70% 12px,
      72.5% 0,   75% 12px,
      77.5% 0,   80% 12px,
      82.5% 0,   85% 12px,
      87.5% 0,   90% 12px,
      92.5% 0,   95% 12px,
      97.5% 0,   100% 12px,
      100% calc(100% - 12px),
      97.5% 100%, 95% calc(100% - 12px),
      92.5% 100%, 90% calc(100% - 12px),
      87.5% 100%, 85% calc(100% - 12px),
      82.5% 100%, 80% calc(100% - 12px),
      77.5% 100%, 75% calc(100% - 12px),
      72.5% 100%, 70% calc(100% - 12px),
      67.5% 100%, 65% calc(100% - 12px),
      62.5% 100%, 60% calc(100% - 12px),
      57.5% 100%, 55% calc(100% - 12px),
      52.5% 100%, 50% calc(100% - 12px),
      47.5% 100%, 45% calc(100% - 12px),
      42.5% 100%, 40% calc(100% - 12px),
      37.5% 100%, 35% calc(100% - 12px),
      32.5% 100%, 30% calc(100% - 12px),
      27.5% 100%, 25% calc(100% - 12px),
      22.5% 100%, 20% calc(100% - 12px),
      17.5% 100%, 15% calc(100% - 12px),
      12.5% 100%, 10% calc(100% - 12px),
      7.5%  100%, 5%  calc(100% - 12px),
      2.5%  100%, 0   calc(100% - 12px)
    );
  }

  /* paper grain + soft vignette */
  .receipt::before {
    content: "";
    position: absolute;
    inset: 0;
    pointer-events: none;
    background:
      radial-gradient(
        ellipse 120% 80% at 50% 50%,
        transparent 55%,
        rgba(120,120,120,0.015) 85%,
        rgba(120,120,120,0.03) 100%
      ),
      url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='160' height='160'><filter id='n'><feTurbulence type='fractalNoise' baseFrequency='0.85' numOctaves='2' stitchTiles='stitch'/><feColorMatrix values='0 0 0 0 0.06  0 0 0 0 0.06  0 0 0 0 0.06  0 0 0 0.06 0'/></filter><rect width='100%' height='100%' filter='url(%23n)'/></svg>"),
      linear-gradient(180deg, var(--paper) 0%, var(--paper) 100%);
    background-blend-mode: multiply, multiply, normal;
    opacity: 1;
    mix-blend-mode: multiply;
  }

  /* faint horizontal thermal-print stripes */
  .receipt::after {
    content: "";
    position: absolute; inset: 0;
    pointer-events: none;
    background: repeating-linear-gradient(
      0deg,
      rgba(40,30,15,0) 0px,
      rgba(40,30,15,0) 3px,
      rgba(40,30,15,0.025) 3px,
      rgba(40,30,15,0.025) 4px
    );
    mix-blend-mode: multiply;
  }

  .receipt > * { position: relative; z-index: 1; }

  /* ─── header ─── */
  .brand {
    display: flex;
    align-items: center;
    gap: 14px;
    margin-bottom: 28px;
  }
  .brand-mark {
    width: 32px; height: 32px;
    background: var(--ink);
    clip-path: polygon(0 0, 60% 0, 100% 50%, 60% 100%, 0 100%, 40% 50%);
    flex: 0 0 auto;
  }
  .brand-name {
    font-size: 28px;
    font-weight: 700;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: var(--ink);
    line-height: 1;
  }

  /* ─── curl command ─── */
  .curl {
    font-size: 15px;
    color: var(--accent);
    font-weight: 500;
    margin: 8px 0 24px;
    word-break: break-all;
    line-height: 1.5;
  }
  .curl .verb  { color: var(--accent); }
  .curl .quote { color: var(--accent); }

  /* ─── http-ish headers ─── */
  .headers {
    font-size: 14px;
    line-height: 1.7;
    margin-bottom: 28px;
  }
  .headers .h-key { color: var(--ink); font-weight: 500; }
  .headers .h-val { color: var(--ink); }

  .headers a {
    color: inherit;
    text-decoration: none;
  }
  .headers a:hover {
    text-decoration: underline;
  }

  /* ─── JSON body ─── */
  .json {
    font-size: 14px;
    line-height: 1.75;
    word-break: break-word;
  }

  .json .brace   { color: var(--ink); }
  .json .key     { color: var(--ink); font-weight: 600; }
  .json .punc    { color: var(--ink-soft); }
  .json .str     { color: var(--ink); }
  .json .num     { color: var(--ink); }
  .json .comment { color: var(--ink-faint); font-style: italic; }
  .json .section { margin: 6px 0; }
  .json .row     { display: block; }
  .json .indent-1 { padding-left: 20px; }
  .json .indent-2 { padding-left: 40px; }
  .json .indent-3 { padding-left: 60px; }

  /* clickable skill token inside a JSON array */
  .skill {
    display: inline-block;
    padding: 1px 6px;
    margin: 0 1px;
    border-radius: 3px;
    cursor: pointer;
    color: var(--ink);
    background: transparent;
    transition: background 80ms ease, color 80ms ease;
    user-select: none;
    /*border: 1px dashed transparent; */
    vertical-align: baseline;
    line-height: 1.4;
    font-size: inherit;
    font-family: inherit;
    border: none;
  }
  .skill:hover {
    background: rgba(42,36,28,0.08);
    /*border-color: rgba(42,36,28,0.25);*/
  }
  .skill.selected {
    background: var(--pick-bg);
    color: var(--paper);
    /*border-color: var(--pick-bg);*/
  }
  .skill.group {
    font-weight: 600;
    background: rgba(94,128,150,0.10);
  }
  .skill.group.selected {
    background: var(--pick-bg);
    color: var(--paper);
  }
  .skill.group.partial {
    background: rgba(94,128,150,0.16);
    color: var(--ink);
  }
  .skill-group-key {
    display: inline-block;
    padding: 1px 6px;
    border-radius: 3px;
    cursor: pointer;
    transition: background 80ms ease, color 80ms ease;
    font: inherit;
    font-weight: 600;
    border: none;
    background: transparent;
    color: var(--ink);
  }
  .skill-group-key:hover {
    background: rgba(42,36,28,0.08);
  }
  .skill-group-key.selected {
    background: var(--pick-bg);
    color: var(--paper);
  }
  .skill-group-key.partial {
    background: rgba(94,128,150,0.16);
    color: var(--ink);
  }

  .skill.dim { color: var(--ink-faint); }

  /* matched skill highlight inside project/activity entries */
  .skill-tag {
    display: inline-block;
    padding: 0 4px;
    border-radius: 2px;
  }
  .skill-tag.matched {
    background: rgba(200,50,74,0.12);
    color: var(--ink);
  }

  /* ─── file tabs ─── */
  .tabs {
    display: flex;
    gap: 4px;
    margin: 6px 0 -1px;
    padding-left: 2px;
    position: relative;
    z-index: 2;
  }
  .tab {
    font: inherit;
    font-size: 13px;
    font-weight: 500;
    padding: 7px 16px 9px;
    /*border: 1px solid var(--ink);*/
    border-bottom: none;
    border-radius: 6px 6px 0 0;
    background: var(--paper-shade);
    border: none;
    color: var(--ink-soft);
    cursor: pointer;
    letter-spacing: 0.02em;
    position: relative;
    transition: background 100ms ease, color 100ms ease;
  }
  .tab:hover { color: var(--ink); }
  .tab.active {
    background: var(--paper);
    color: var(--ink);
    font-weight: 600;
    z-index: 3;
  }
  .tab .dot {
    display: inline-block;
    width: 6px; height: 6px;
    border-radius: 50%;
    background: var(--accent);
    margin-right: 8px;
    vertical-align: middle;
    transform: translateY(-1px);
    opacity: 0.5;
  }
  .tab.active .dot { opacity: 1; }

  /* ─── file frame ─── */
  .file-frame {
    /* border: 1px solid var(--ink); */
    border-radius: 0 6px 6px 6px;
    padding: 14px 18px 22px;
    background: var(--paper);
    box-shadow: inset 0 0 0 1px rgba(255,255,255,0.35);
    position: relative;
  }
  .file-frame .filename {
    font-size: 11px;
    color: var(--ink-faint);
    letter-spacing: 0.12em;
    margin-bottom: 12px;
    display: flex;
    justify-content: space-between;
    text-transform: uppercase;
    border-bottom: 1px dashed var(--ink-faint);
    padding-bottom: 8px;
  }

  .toolbar {
    display: flex;
    align-items: flex-start;
    gap: 12px;
    margin: 18px 0 0;
    font-size: 13px;
    color: var(--ink-soft);
  }
  .toolbar .pill {
    border: 1px solid var(--ink-soft);
    padding: 3px 10px;
    border-radius: 999px;
    cursor: pointer;
    color: var(--ink);
    background: transparent;
    font: inherit;
    font-size: 12px;
    flex-shrink: 0;
    white-space: nowrap;
  }
  .toolbar .pill:hover { background: rgba(42,36,28,0.06); }
  .toolbar .pill[disabled] { opacity: 0.4; cursor: default; }
  .toolbar .filter-count {
    font-size: 12px;
    color: var(--accent);
    flex: 1;
    min-width: 0;
    overflow: visible;
    text-overflow: clip;
    white-space: normal;
    overflow-wrap: anywhere;
    line-height: 1.5;
  }

  /* hide entries when they don't match the selected skill filter */
  .entry { transition: opacity 120ms ease, filter 120ms ease; }
  .entry.hidden {
    display: none;
  }

  .divider {
    text-align: center;
    color: var(--ink-faint);
    letter-spacing: 0.4em;
    margin: 22px 0 12px;
    font-size: 12px;
    user-select: none;
  }

  .footer {
    margin-top: 28px;
    text-align: center;
    font-size: 11px;
    color: var(--ink-soft);
    letter-spacing: 0.15em;
  }
  .footer .barcode {
    height: 36px;
    margin: 8px auto 6px;
    width: 70%;
    background: repeating-linear-gradient(90deg,
      var(--ink) 0, var(--ink) 1px, transparent 1px, transparent 3px,
      var(--ink) 3px, var(--ink) 5px, transparent 5px, transparent 6px,
      var(--ink) 6px, var(--ink) 7px, transparent 7px, transparent 11px,
      var(--ink) 11px, var(--ink) 14px, transparent 14px, transparent 16px
    );
    opacity: 0.85;
  }

  /* small screens */
  @media (max-width: 520px) {
    body { padding: 16px 8px 40px; }
    .receipt { padding: 44px 22px; }
    .brand-name { font-size: 22px; }
    .curl { font-size: 13px; }
    .headers, .json { font-size: 12.5px; }
    .json .indent-1 { padding-left: 14px; }
    .json .indent-2 { padding-left: 28px; }
    .json .indent-3 { padding-left: 42px; }
  }
</style>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
</head>
<body>
  <div id="root"></div>
  <script type="text/babel" src="resume.jsx"></script>
</body>
</html>
